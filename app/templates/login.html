<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - ITSH Asterisk WebGUI</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
<main style="max-width:480px">
  <h1>Login</h1>
  <p class="muted">ITSH Neumeier Asterisk SIP-Trunk Management v{{ version }}</p>
  {% if error %}<p style="color:var(--danger)">{{ error }}</p>{% endif %}
  <form method="post" action="/login">
    <label>Benutzer</label>
    <input name="username" value="admin" required>
    <label>Passwort</label>
    <input type="password" name="password" required>
    <button type="submit">Anmelden</button>
  </form>
</main>
</body>
</html>
