<!doctype html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ t("login") }} - ITSH Asterisk WebGUI</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
<header>
  <div>
    <strong>ITSH Neumeier Asterisk WebGUI AIO</strong>
    <span class="muted">v{{ version }}</span>
  </div>
  <nav>
    <a href="/language/de" title="Deutsch">🇩🇪</a>
    <a href="/language/en" title="English">🇬🇧</a>
  </nav>
</header>
<main style="max-width:480px">
  <h1>{{ t("login") }}</h1>
  {% if error %}<p style="color:var(--danger)">{{ error }}</p>{% endif %}
  <form method="post" action="/login">
    <label>{{ t("username") }}</label>
    <input name="username" value="admin" required>
    <label>{{ t("password") }}</label>
    <input type="password" name="password" required>
    <button type="submit">{{ t("login") }}</button>
  </form>
</main>
</body>
</html>
