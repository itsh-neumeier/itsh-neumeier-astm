{% extends "base.html" %}
{% block content %}
<h1>{{ t("apply_config") }}</h1>
{% if result %}
<div class="card">
  <strong>{{ t("applied") }}</strong>
  <div>Backup: {{ result.backup }}</div>
  <pre>{{ result.reload }}</pre>
</div>
{% endif %}
<form method="post" action="/apply">
  <p>{{ t("writes_config") }}</p>
  <button type="submit">{{ t("apply_now") }}</button>
</form>
<h2>pjsip.conf</h2>
<pre>{{ rendered.pjsip }}</pre>
<h2>extensions.conf</h2>
<pre>{{ rendered.extensions }}</pre>
{% endblock %}
