{% extends "base.html" %}
{% block content %}
<h1>{{ t("provider_numbers") }}</h1>
<table>
  <tr><th>{{ t("did_plus") }}</th><th>{{ t("sip_user") }}</th><th>{{ t("sip_password") }}</th><th>{{ t("unifi") }} Talk</th><th>{{ t("action") }}</th></tr>
  {% for number in numbers %}
  <tr>
    <form method="post" action="/numbers/{{ number.id }}">
      <td><input name="did_plus" value="{{ number.did_plus }}" required></td>
      <td><input name="sip_username" value="{{ number.sip_username }}" required></td>
      <td><input name="sip_password" value="{{ number.sip_password }}" required></td>
      <td>
        <button type="submit" formaction="/numbers/{{ number.id }}/provision-unifi">{{ t("provision") }}</button>
      </td>
      <td>
        <button type="submit">{{ t("save") }}</button>
        <button class="danger" type="submit" formaction="/delete/numbers/{{ number.id }}">{{ t("delete") }}</button>
      </td>
    </form>
  </tr>
  {% endfor %}
</table>
<p class="muted">{{ t("unifi_provision_hint") }}</p>
<h2>{{ t("add_number") }}</h2>
<form method="post" action="/numbers">
  <label>{{ t("did_plus") }}</label><input name="did_plus" placeholder="+491234567890" required>
  <label>{{ t("sip_user") }}</label><input name="sip_username" required>
  <label>{{ t("sip_password") }}</label><input name="sip_password" type="password" required>
  <button type="submit">{{ t("add") }}</button>
</form>
{% endblock %}
