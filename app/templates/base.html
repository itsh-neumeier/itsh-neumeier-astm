<!doctype html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ settings.app_title if settings else 'ITSH Asterisk WebGUI' }}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
<header>
  <div>
    <strong>ITSH Neumeier Asterisk WebGUI AIO</strong>
    <span class="muted">v{{ version }}</span>
  </div>
  <nav>
    {% if user %}
    <a href="/">{{ t("dashboard") }}</a>
    <a href="/settings">{{ t("provider") }}</a>
    <a href="/numbers">{{ t("numbers") }}</a>
    <a href="/clients">{{ t("clients") }}</a>
    <a href="/routes">{{ t("routing") }}</a>
    <a href="/preview">{{ t("apply") }}</a>
    <a href="/unifi">{{ t("unifi") }}</a>
    {% endif %}
    <a href="/language/de" title="Deutsch">🇩🇪</a>
    <a href="/language/en" title="English">🇬🇧</a>
  </nav>
  {% if user %}
  <form method="post" action="/logout" style="padding:0;border:0;background:transparent">
    <button type="submit">{{ t("logout") }}</button>
  </form>
  {% endif %}
</header>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
