<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ settings.app_title if settings else 'ITSH Asterisk WebGUI' }}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
<header>
  <div>
    <strong>ITSH Neumeier Asterisk WebGUI AIO</strong>
    <span class="muted">v{{ version }}</span>
  </div>
  {% if user %}
  <nav>
    <a href="/">Dashboard</a>
    <a href="/settings">Provider</a>
    <a href="/numbers">Rufnummern</a>
    <a href="/clients">Clients</a>
    <a href="/routes">Routing</a>
    <a href="/preview">Apply</a>
    <a href="/unifi">UniFi</a>
  </nav>
  <form method="post" action="/logout" style="padding:0;border:0;background:transparent">
    <button type="submit">Logout</button>
  </form>
  {% endif %}
</header>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
